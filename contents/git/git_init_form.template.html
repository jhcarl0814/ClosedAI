<div class="hidden [#reference\_desk\_dispatcher\_form.git\_init~*_&]:block border-[1px] border-solid border-[#C0C0C0] bg-[#FAFAFA] rounded-[8px] px-[1em] py-[0.5em] mt-[16px]">
	<h1 class="heading1"><span class="command [outline:dashed_2px_#C0C0C0] [#reference\_desk\_dispatcher\_example.git\_init~*_&]:[outline:dashed_2px_#0000FF]" onmousedown="reference_desk_widget_mousepressed('git_init')">git init [&lt;directory&gt;]</span></h1>
	<p class="paragraph"><a class="external_link" href="https://git-scm.com/docs/git-init">https://git-scm.com/docs/git-init</a></p>
	<form id="git_init_form">
		<div><input type="checkbox" id="git_init_has_directory" name="git_init_has_directory"><label for="git_init_has_directory"><span class="command">&lt;directory&gt;</span> If you provide a <span class="command">&lt;directory&gt;</span>, the command is run inside it. If this directory does not exist, it will be created.</label></div>
		<div class="flex [align-items:first_baseline]"><label for="git_init_directory"><span class="command">&lt;directory&gt;</span>:</label><textarea wrap="off" id="git_init_directory" name="git_init_directory" class="basis-0 grow command_input"></textarea></div>
		
		<div><input type="checkbox" id="git_init_has_quiet" name="git_init_has_quiet"><label for="git_init_has_quiet"><span class="command">--quiet</span> Only print error and warning messages; all other output will be suppressed.</label></div>
		<div class="[outline:dashed_2px_#C0C0C0] [#reference\_desk\_dispatcher\_example.git\_init\_bare~*_&]:[outline:dashed_2px_#0000FF]" onmousedown="reference_desk_widget_mousepressed('git_init_bare')"><input type="checkbox" id="git_init_has_bare" name="git_init_has_bare"><label for="git_init_has_bare"><span class="command">--bare</span> Create a bare repository.</label></div>
		
		<div><input type="checkbox" id="git_init_has_object_format" name="git_init_has_object_format"><label for="git_init_has_object_format"><span class="command">--object-format=&lt;format&gt;</span> Specify the given object &lt;format&gt; (hash algorithm) for the repository.</label></div>
		<div class="flex [align-items:first_baseline]"><label for="git_init_object_format"><span class="command">&lt;format&gt;</span>:</label><input type="text" id="git_init_object_format" name="git_init_object_format" class="basis-0 grow command_input" value="sha1"></div>
		
		<div class="[outline:dashed_2px_#C0C0C0] [#reference\_desk\_dispatcher\_example.git\_init\_template~*_&]:[outline:dashed_2px_#0000FF]" onmousedown="reference_desk_widget_mousepressed('git_init_template')">
			<div><input type="checkbox" id="git_init_has_template" name="git_init_has_template"><label for="git_init_has_template"><span class="command">--template=&lt;template-directory&gt;</span> Specify the directory from which templates will be used.</label></div>
			<div class="flex [align-items:first_baseline]"><label for="git_init_template"><span class="command">&lt;template-directory&gt;</span>:</label><textarea wrap="off" id="git_init_template" name="git_init_template" class="basis-0 grow command_input"></textarea></div>
		</div>
		
		<div class="[outline:dashed_2px_#C0C0C0] [#reference\_desk\_dispatcher\_example.git\_init\_separate\_git\_dir~*_&]:[outline:dashed_2px_#0000FF]" onmousedown="reference_desk_widget_mousepressed('git_init_separate_git_dir')">
			<div><input type="checkbox" id="git_init_has_separate_git_dir" name="git_init_has_separate_git_dir"><label for="git_init_has_separate_git_dir"><span class="command">--separate-git-dir=&lt;git-dir&gt;</span> Instead of initializing the repository as a directory to either <span class="inline-code">$GIT_DIR</span> or <span class="inline-code">./.git/</span>, create a text file there containing the path to the actual repository. If this is a reinitialization, the repository will be moved to the specified path.</label></div>
			<div class="flex [align-items:first_baseline]"><label for="git_init_separate_git_dir"><span class="command">&lt;git-dir&gt;</span>:</label><textarea wrap="off" id="git_init_separate_git_dir" name="git_init_separate_git_dir" class="basis-0 grow command_input"></textarea></div>
		</div>
		
		<div class="[outline:dashed_2px_#C0C0C0] [#reference\_desk\_dispatcher\_example.git\_init\_initial\_branch~*_&]:[outline:dashed_2px_#0000FF]" onmousedown="reference_desk_widget_mousepressed('git_init_initial_branch')">
			<div><input type="checkbox" id="git_init_has_initial_branch" name="git_init_has_initial_branch"><label for="git_init_has_initial_branch"><span class="command">--initial-branch=&lt;branch-name&gt;</span> Use &lt;branch-name&gt; for the initial branch in the newly created repository.</label></div>
			<div class="flex [align-items:first_baseline]"><label for="git_init_initial_branch"><span class="command">&lt;branch-name&gt;</span>:</label><input type="text" id="git_init_initial_branch" name="git_init_initial_branch" class="basis-0 grow command_input" value="main"></div>
		</div>
		
		<div><input type="checkbox" id="git_init_has_shared" name="git_init_has_shared"><label for="git_init_has_shared"><span class="command">--shared[</span></label><input type="checkbox" id="git_init_shared_has_argument" name="git_init_shared_has_argument"><label for="git_init_shared_has_argument"><span class="command">=(false|true|umask|group|all|world|everybody|&lt;perm&gt;)]</span> Specify that the Git repository is to be shared amongst several users.</label></div>
		<div class="flex [align-items:first_baseline]"><label for="git_init_shared_perm"><span class="command">&lt;perm&gt;</span>:</label><input type="text" id="git_init_shared_perm" name="git_init_shared_perm" class="basis-0 grow command_input" value="0640"></div>
	</form>
	<textarea readonly wrap="off" id="git_init_command" name="git_init_command" class="command_input mt-[1em]"></textarea>
	<script>
		function git_init_refresh(){
			document.getElementById("git_init_directory").disabled = !document.getElementById("git_init_has_directory").checked;
			document.getElementById("git_init_object_format").disabled = !document.getElementById("git_init_has_object_format").checked;
			document.getElementById("git_init_template").disabled = !document.getElementById("git_init_has_template").checked;
			document.getElementById("git_init_separate_git_dir").disabled = !document.getElementById("git_init_has_separate_git_dir").checked;
			document.getElementById("git_init_initial_branch").disabled = !document.getElementById("git_init_has_initial_branch").checked;
			document.getElementById("git_init_shared_has_argument").disabled = !document.getElementById("git_init_has_shared").checked;
			document.getElementById("git_init_shared_perm").disabled = !(document.getElementById("git_init_has_shared").checked && document.getElementById("git_init_shared_has_argument").checked);
			
			let { has_error: has_error, command_components: command_components, } = git_with_command_refresh();
			command_components.push("init");

			let form_data = new FormData(document.getElementById("git_init_form"));
			if(form_data.get("git_init_has_quiet"))
				command_components.push("--quiet");
			if(form_data.get("git_init_has_bare"))
				command_components.push("--bare");
			if(form_data.get("git_init_has_object_format")){
				if(form_data.get("git_init_object_format").length == 0){
					document.getElementById("git_init_object_format").classList.add("bg-[#FF8888]");
					has_error = true;
				}
				else{
					document.getElementById("git_init_object_format").classList.remove("bg-[#FF8888]");
					command_components.push("--object-format=" + shell_quote(form_data.get("git_init_object_format")));
				}
			}
			if(form_data.get("git_init_has_template")){
				if(form_data.get("git_init_template").length == 0){
					document.getElementById("git_init_template").classList.add("bg-[#FF8888]");
					has_error = true;
				}
				else{
					document.getElementById("git_init_template").classList.remove("bg-[#FF8888]");
					command_components.push("--template=" + shell_quote(form_data.get("git_init_template")));
				}
			}
			if(form_data.get("git_init_has_separate_git_dir")){
				if(form_data.get("git_init_separate_git_dir").length == 0){
					document.getElementById("git_init_separate_git_dir").classList.add("bg-[#FF8888]");
					has_error = true;
				}
				else{
					document.getElementById("git_init_separate_git_dir").classList.remove("bg-[#FF8888]");
					command_components.push("--separate-git-dir=" + shell_quote(form_data.get("git_init_separate_git_dir")));
				}
			}
			if(form_data.get("git_init_has_initial_branch")){
				if(form_data.get("git_init_initial_branch").length == 0){
					document.getElementById("git_init_initial_branch").classList.add("bg-[#FF8888]");
					has_error = true;
				}
				else{
					document.getElementById("git_init_initial_branch").classList.remove("bg-[#FF8888]");
					command_components.push("--separate-git-dir=" + shell_quote(form_data.get("git_init_initial_branch")));
				}
			}
			if(form_data.get("git_init_has_shared")){
				if(form_data.get("git_init_shared_has_argument")){
					if(form_data.get("git_init_shared_perm").length == 0){
						document.getElementById("git_init_shared_perm").classList.add("bg-[#FF8888]");
						has_error = true;
					}
					else{
						document.getElementById("git_init_shared_perm").classList.remove("bg-[#FF8888]");
						command_components.push("--shared=" + shell_quote(form_data.get("git_init_shared_perm")));
					}
				}
				else{
					command_components.push("--shared");
				}
			}
			if(form_data.get("git_init_has_directory")){
				if(form_data.get("git_init_directory").length == 0){
					document.getElementById("git_init_directory").classList.add("bg-[#FF8888]");
					has_error = true;
				}
				else{
					document.getElementById("git_init_directory").classList.remove("bg-[#FF8888]");
					command_components.push(shell_quote(form_data.get("git_init_directory")));
				}
			}

			let git_init_command = document.getElementById("git_init_command");
			if(!has_error){
				git_init_command.classList.remove("!bg-[#FF8888]");
				git_init_command.value = command_components.join(" ");
			}
			else{
				git_init_command.classList.add("!bg-[#FF8888]");
				git_init_command.value = "";
			}
		}
		Array.from(document.getElementById("git_init_form").getElementsByTagName("input")).forEach(function(input){
			input.addEventListener("input", git_init_refresh);
		});
		Array.from(document.getElementById("git_init_form").getElementsByTagName("textarea")).forEach(function(input){
			input.addEventListener("input", git_init_refresh);
		});
	</script>
</div>
